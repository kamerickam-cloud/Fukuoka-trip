<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Gold Fukuoka Travel 2026</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');
        body { background-color: #0a0a0a; font-family: 'Playfair Display', serif; }
        .gold-text { color: #d4af37; }
        .gold-border { border-color: #d4af37; }
        .luxury-hover:hover { color: white; border-color: white; transform: translateY(-1px); }
        .luxury-btn-hover:hover { background-color: #d4af37; color: black; border-color: #d4af37; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 16, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [selectedDay, setSelectedDay] = useState(null);

            const tripData = {
                1: { label: "I", date: "07 JUNE", title: "抵達福岡 / 燒肉之夜", events: [
                    { time: "12:35", title: "航班 UO638", loc: "HKG → FUK", desc: "開啟九州之旅。" },
                    { time: "18:00", title: "酒店入住", loc: "Via Inn Hakata", desc: "抵達博多市區，辦理入住手續並放置行李。" },
                    { time: "18:30", title: "博多運河城", loc: "Canal City Hakata", desc: "步行約 12 分鐘。適合購買運動品牌、動漫周邊 (Jump Shop) 或逛 Muji。" },
                    { time: "20:00", title: "晚餐：大東園", loc: "大東園 本店", desc: "預約 20:00。從運河城步行約 5 分鐘即可抵達這家老字號和牛燒肉店。" }
                ]},
                2: { label: "II", date: "08 JUNE", title: "天神商圈 / 我英特展", events: [
                    { time: "10:00", title: "我英特展", loc: "天神三越", desc: "參觀我的英雄學院展覽。" },
                    { time: "13:00", title: "午餐：Nasubi", loc: "天婦羅 なすび", desc: "享用精緻天婦羅。" },
                    { time: "15:00", title: "天神核心商圈", loc: "天神地下街", desc: "福岡奢華購物區。" },
                    { time: "20:00", title: "晚餐：鳥魚 古家", loc: "とりとさかな 古家", desc: "預約 20:00。地址：福岡市中央区平尾1-9-6。主打地雞料理與當季海鮮。" },
                    { time: "STAY", title: "酒店休息", loc: "Via Inn Hakata", desc: "回到博多車站旁酒店。" }
                ]},
                3: { label: "III", date: "09 JUNE", title: "藥院散策 / 豆腐名店", events: [
                    { time: "12:00", title: "午餐：Kamakiri", loc: "釜喜利うどん", desc: "精緻烏龍麵。" },
                    { time: "14:30", title: "藥院法式甜點", loc: "Au fil du jour", desc: "地址：福岡市中央区平尾1-9-6。品嚐名店法式甜點，感受藥院區的高雅氛圍。" },
                    { time: "20:30", title: "晚餐：三原豆腐店", loc: "三原豆腐店", desc: "預約 20:30。現代豆腐料理。" },
                    { time: "STAY", title: "酒店休息", loc: "Via Inn Hakata", desc: "最後一晚入住博多 Via Inn。" }
                ]},
                4: { label: "IV", date: "10 JUNE", title: "系島自駕 / 海岸漫遊", events: [
                    { time: "10:00", title: "系島海岸", loc: "櫻井二見ヶ浦", desc: "欣賞白色鳥居美景，享受慢節奏海岸自駕。" },
                    { time: "14:00", title: "午餐：白浜家", loc: "糸島 牡蠣小屋 白浜家", desc: "海邊享用新鮮海產料理。" },
                    { time: "STAY", title: "入住系島", loc: "梅屋旅館", desc: "入住糸島特色旅宿「梅屋旅館」，享受自然靜謐的一晚。" }
                ]},
                5: { label: "V", date: "11 JUNE", title: "悠閒全精華：日田自駕", events: [
                    { time: "08:30", title: "糸島出發", loc: "梅屋旅館", desc: "在旅館享用早餐後出發前往日田方向。" },
                    { time: "10:00", title: "福島八幡宮", loc: "福島八幡宮", desc: "位於八女市。欣賞精美的御朱印。" },
                    { time: "12:15", title: "大山水壩午餐", loc: "道の駅 水辺の郷おおやま", desc: "看進擊的巨人銅像並享用午餐。" },
                    { time: "13:45", title: "巨人 Museum (一館)", loc: "進撃の巨人 in HITA ミュージアム", desc: "觀看早期原稿。" },
                    { time: "14:45", title: "巨人 Museum (二館)", loc: "サッポロビール九州日田工場", desc: "札幌啤酒工廠內的後期原稿展。" },
                    { time: "16:00", title: "豆田町散步", loc: "豆田町", desc: "日田的小京都，適合漫步購物。" },
                    { time: "18:00", title: "抵達酒店", loc: "Green Rich Hotel Kurume", desc: "入住並享用天然溫泉。" },
                    { time: "20:00", title: "晚餐多選方案", loc: "Torisuke / Shohachiro / Vishnu", desc: "備選 1: Torisuke (02:00 關門)\n備選 2: Shohachiro Udon (21:00 關門)\n備選 3: インド料理ビスヌ 百年公園店 (22:00 關門)" }
                ]},
                6: { label: "VI", date: "12 JUNE", title: "太宰府參拜 / LaLaport 鋼彈", events: [
                    { time: "10:00", title: "太宰府天滿宮", loc: "太宰府天滿宮", desc: "祈求學業與順利。" },
                    { time: "14:30", title: "LaLaport 福岡", loc: "ららぽーと福岡", desc: "購物中心與 1:1 鋼彈。" },
                    { time: "18:30", title: "晚餐：待定 / 拉麵", loc: "Pending / Ramen", desc: "根據當日疲累程度決定，備選拉麵名店。" },
                    { time: "STAY", title: "酒店休息", loc: "Hotel Vessel Kaizuka", desc: "入住位於貝塚的 Vessel Hotel。" }
                ]},
                7: { label: "VII", date: "13 JUNE", title: "最終採買 / 歸途", events: [
                    { time: "10:30", title: "AEON MALL 福岡", loc: "イオンモール福岡", desc: "大型賣場最後掃貨。" },
                    { time: "14:30", title: "Marinoa City", loc: "マリノアシティ福岡", desc: "Outlet 品牌採買。" },
                    { time: "17:30", title: "機場還車", loc: "福岡空港", desc: "辦理手續。" },
                    { time: "20:35", title: "返程航班", loc: "FUK → HKG", desc: "搭乘 UO695 返回香港。" }
                ]}
            };

            const openInGoogleMaps = (location) => {
                if (!location || location === "TBA" || location.includes("Pending") || location.includes("Torisuke")) return;
                const searchQuery = location.split(' / ')[0].split(' → ')[0];
                const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(searchQuery)}`;
                window.open(url, '_blank');
            };

            const goBack = () => {
                setCurrentPage('home');
                window.scrollTo(0, 0);
            };

            return (
                <div className="min-h-screen text-[#d4af37] p-4 pb-20">
                    {currentPage === 'home' ? (
                        <div className="max-w-3xl mx-auto py-12">
                            <header className="text-center mb-16">
                                <p className="text-[10px] tracking-[0.6em] uppercase font-bold text-[#997b2d] mb-4">Private Collection 2026</p>
                                <h1 className="text-6xl md:text-8xl font-light text-white uppercase tracking-widest mb-8 text-center">FUKUOKA</h1>
                                <div className="flex justify-center items-center gap-6 text-[10px] tracking-[0.4em] text-[#997b2d] italic">
                                    <span>06.07</span>
                                    <Icon name="sparkles" size={12} className="text-[#d4af37]" />
                                    <span>06.13</span>
                                </div>
                            </header>
                            <div className="space-y-6">
                                {Object.keys(tripData).map(key => (
                                    <button key={key} onClick={() => { setSelectedDay(key); setCurrentPage('detail'); window.scrollTo(0,0); }} className="w-full bg-[#111] border border-[#2a2418] p-8 text-left hover:border-[#d4af37] transition-all group">
                                        <div className="flex justify-between items-center">
                                            <div>
                                                <div className="text-[11px] text-[#997b2d] mb-2 uppercase tracking-widest font-bold">Day {tripData[key].label} • {tripData[key].date}</div>
                                                <div className="text-2xl md:text-3xl text-white uppercase tracking-wider group-hover:text-[#d4af37] transition-colors">{tripData[key].title}</div>
                                            </div>
                                            <div className="w-10 h-10 rounded-full border border-[#2a2418] flex items-center justify-center group-hover:border-[#d4af37] group-hover:bg-[#d4af37]/5 transition-all">
                                                <Icon name="chevron-right" size={20} className="text-[#997b2d]" />
                                            </div>
                                        </div>
                                    </button>
                                ))}
                            </div>
                        </div>
                    ) : (
                        <div className="max-w-2xl mx-auto py-12">
                            <button onClick={goBack} className="mb-12 text-[10px] uppercase tracking-[0.4em] flex items-center gap-2 hover:text-white transition-colors font-bold text-[#997b2d]">
                                <Icon name="arrow-left" size={14} /> Back to Collection
                            </button>
                            <header className="mb-24">
                                <span className="text-[11px] tracking-[0.4em] font-bold uppercase text-[#997b2d] block mb-4 italic underline underline-offset-8">Episode {tripData[selectedDay].label}</span>
                                <h2 className="text-4xl md:text-5xl text-white uppercase tracking-tight italic">
                                    {tripData[selectedDay].title}
                                </h2>
                            </header>
                            
                            <div className="space-y-20">
                                {tripData[selectedDay].events.map((event, i) => (
                                    <div key={i} className="border-l border-[#2a2418] pl-8 relative pb-4">
                                        <div className="flex flex-col gap-4 mb-4">
                                            <div className="text-4xl text-white font-light tracking-tighter">{event.time}</div>
                                            <div className="flex items-center gap-4">
                                                <div className="inline-flex items-center gap-2 px-3 py-1.5 bg-[#121212] border border-[#2a2418] rounded-full text-[10px] uppercase tracking-widest font-bold text-[#997b2d]">
                                                    <Icon name="map-pin" size={12} /> {event.loc}
                                                </div>
                                                {(!event.loc.includes("TBA") && !event.loc.includes("/") && !event.loc.includes("Pending") && event.loc !== "HKG → FUK") && (
                                                    <button 
                                                        onClick={() => openInGoogleMaps(event.loc)} 
                                                        className="w-8 h-8 rounded-full border border-[#d4af37] flex items-center justify-center text-[#d4af37] luxury-hover transition-all"
                                                        title="View on Map"
                                                    >
                                                        <Icon name="compass" size={16} />
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                        <div className="text-white text-xl mb-3 uppercase tracking-widest font-bold">{event.title}</div>
                                        <div className="text-[#997b2d] text-sm whitespace-pre-line leading-relaxed italic opacity-80">{event.desc}</div>
                                    </div>
                                ))}
                            </div>
                            
                            <div className="mt-24 pt-16 border-t border-[#2a2418] flex justify-center">
                                <button 
                                    onClick={goBack}
                                    className="px-16 py-5 border border-[#d4af37] text-[#d4af37] text-[11px] uppercase tracking-[0.5em] font-bold luxury-btn-hover transition-all"
                                >
                                    Back to Collection
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
